name = "macunaima"
main = "src/index.ts"
compatibility_date = "2025-03-01"

[vars]
# Confidence threshold (0.0 – 1.0) above which a message is deleted
SPAM_THRESHOLD = "0.50"
# Number of spam warnings before the user is banned
MAX_WARNINGS = "3"
# Gemini model to use for spam analysis
# GEMINI_MODEL = "gemini-2.0-flash"
# GEMINI_MODEL = "gemini-2.0-flash-lite"
GEMINI_MODEL = "gemini-2.5-flash-lite"
# Minutes a new member has to solve the captcha before being kicked
CAPTCHA_TIMEOUT_MINUTES = "15"
# Confidence threshold for profile-based removal (photo + bio analysis)
PROFILE_CHECK_THRESHOLD = "0.50"
# Confidence threshold for offensive content auto-warn (higher = fewer false positives)
OFFENSIVE_THRESHOLD = "0.80"
# Seconds a user is "throttled" after a Gemini check (limits API usage)
GEMINI_THROTTLE_SECONDS = "180"
# Max Gemini analyses per group per minute (extra free-tier protection)
GEMINI_MAX_CALLS_PER_MINUTE = "10"

[triggers]
# Checks every minute for members who did not answer the captcha in time
crons = ["*/5 * * * *"]

# Secrets (set via `wrangler secret put`):
#   BOT_TOKEN        – Telegram bot token from @BotFather
#   GOOGLE_AI_API_KEY – Google AI Studio API key

[[kv_namespaces]]
binding = "SPAM_KV"
id = "5755c0ea91e34f7dba1cee29d7cdadd5"
preview_id = "59e7efa296f84f44acccb1df8e4ac1a1"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
